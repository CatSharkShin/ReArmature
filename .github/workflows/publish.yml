name: publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Release version (X.Y.Z)
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-thunderstore-package:
    runs-on: ubuntu-latest
    steps:
      - name: checkout source
        uses: actions/checkout@v4

      - name: setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: resolve release metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CLEAN_VER="${{ inputs.version }}"
            if ! [[ "$CLEAN_VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Input version must be X.Y.Z"
              exit 1
            fi
            RELEASE_TAG="$CLEAN_VER"
          else
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            CLEAN_VER="$RELEASE_TAG"
          fi

          if ! [[ "$CLEAN_VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be X.Y.Z"
            exit 1
          fi

          echo "MOD_VERSION=$CLEAN_VER" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: build mod dll
        run: dotnet build bepis/ReArmature.csproj -c Release

      - name: stage artifacts
        run: |
          mkdir -p dist/BepInEx/plugins/
          cp bepis/bin/Release/**/ReArmature.dll dist/BepInEx/plugins/

      - name: upload to thunderstore
        uses: GreenTF/upload-thunderstore-package@v4.3
        with:
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          community: resonite
          namespace: catshark
          name: rearmature
          version: ${{ env.MOD_VERSION }}
          description: "reassign a skinnedmeshrenderer to a new armature"
          path: 'dist'

  publish-rml-release-and-manifest:
    runs-on: ubuntu-latest
    if: ${{ secrets.RML_MANIFEST_PAT != '' }}
    env:
      RML_MANIFEST_REPO: ${{ vars.RML_MANIFEST_REPO }}
      RML_MANIFEST_REF: ${{ vars.RML_MANIFEST_REF != '' && vars.RML_MANIFEST_REF || 'upstream' }}
      RML_INFO_JSON_PATH: ${{ vars.RML_INFO_JSON_PATH != '' && vars.RML_INFO_JSON_PATH || 'manifest/CatShark/ReArmature/info.json' }}
    steps:
      - name: checkout source
        uses: actions/checkout@v4

      - name: setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: resolve release metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CLEAN_VER="${{ inputs.version }}"
            if ! [[ "$CLEAN_VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Input version must be X.Y.Z"
              exit 1
            fi
            RELEASE_TAG="$CLEAN_VER"
          else
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            CLEAN_VER="$RELEASE_TAG"
          fi

          if ! [[ "$CLEAN_VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be X.Y.Z"
            exit 1
          fi

          echo "MOD_VERSION=$CLEAN_VER" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: build rml dll
        run: dotnet build rml/ReArmature.csproj -c Release

      - name: publish rml dll as release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: rml/bin/Release/net10.0/ReArmature.dll

      - name: compute artifact hash and urls
        run: |
          DLL_PATH="rml/bin/Release/net10.0/ReArmature.dll"
          HASH=$(sha256sum "$DLL_PATH" | awk '{ print $1 }')
          echo "RML_SHA256=$HASH" >> $GITHUB_ENV
          echo "RML_RELEASE_URL=https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}" >> $GITHUB_ENV
          echo "RML_ASSET_URL=https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/ReArmature.dll" >> $GITHUB_ENV

      - name: validate manifest configuration
        run: |
          if [ -z "$RML_MANIFEST_REPO" ]; then
            echo "RML_MANIFEST_REPO variable is not set."
            echo "Set repository variable RML_MANIFEST_REPO to something like owner/repo."
            exit 1
          fi

      - name: checkout rml manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RML_MANIFEST_REPO }}
          ref: ${{ env.RML_MANIFEST_REF }}
          token: ${{ secrets.RML_MANIFEST_PAT }}
          path: manifest-repo
          persist-credentials: true

      - name: update info.json
        run: |
          python3 - << 'PY'
          import json
          import os
          from pathlib import Path

          repo_path = Path('manifest-repo')
          info_rel = os.environ['RML_INFO_JSON_PATH']
          version = os.environ['MOD_VERSION']
          release_url = os.environ['RML_RELEASE_URL']
          asset_url = os.environ['RML_ASSET_URL']
          sha256 = os.environ['RML_SHA256']

          info_path = repo_path / info_rel
          if not info_path.exists():
              raise FileNotFoundError(f"Manifest file not found: {info_path}")

          with info_path.open('r', encoding='utf-8') as f:
              data = json.load(f)

          versions = data.setdefault('versions', {})
          versions[version] = {
              'releaseUrl': release_url,
              'artifacts': [
                  {
                      'url': asset_url,
                      'sha256': sha256,
                  }
              ],
          }

          with info_path.open('w', encoding='utf-8') as f:
              json.dump(data, f, indent='\t')
              f.write('\n')
          PY

      - name: commit and push manifest update
        working-directory: manifest-repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "$RML_INFO_JSON_PATH"
          git commit -m "Update ReArmature to ${MOD_VERSION}" || echo "Nothing to commit"
          git push origin HEAD:${RML_MANIFEST_REF}